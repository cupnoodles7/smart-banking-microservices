server:
  port: 8084   # Use the port assigned by your team if different

spring:
  application:
    name: WALLET-SERVICE

  data:
    mongodb:
      uri: mongodb://localhost:27017/wallet_db

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,beans,httptrace,prometheus
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans

logging:
  level:
    com.smartbank.wallet_service: INFO

info:
  app:
    name: Wallet-Service
    version: 1.0.0
