spring:
  application:
    name: account-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}

server:
  port: 8083

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP:127.0.0.1}

management:
  endpoints:
    web:
      exposure:
        include: health,info


user-service:
  validation-enabled: true

bank:
  savings:
    max-balance: 1000000
    daily-transfer-limit: 100000
    daily-transaction-limit: 20
  current:
    max-balance: 1000000
    daily-transfer-limit: 500000
    daily-transaction-limit: 100
  concurrency:
    max-write-retries: 3
