# Shared defaults applied to every service that imports config from the Config Server.

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

security:
  jwt:
    # If JWT_SECRET is unset the app fails to start
    secret: ${JWT_SECRET}
    access-token-expiry-ms: 900000
    refresh-token-expiry-ms: 604800000   

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
