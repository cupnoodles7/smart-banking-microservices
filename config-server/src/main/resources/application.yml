server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          # Point this at the Git repo that holds the per-service YAML files.
          #
          # Options:
          #  - Push the ./config-repo folder (in this repository root) to a Git remote
          #    and set CONFIG_REPO_URI to that remote, e.g.
          #      export CONFIG_REPO_URI=https://github.com/your-org/bank-config-repo.git
          #  - Or turn ./config-repo into a local Git repo and point at it:
          #      cd config-repo && git init && git add . && git commit -m "config"
          #      export CONFIG_REPO_URI=file://${PWD}
          uri: ${CONFIG_REPO_URI:https://github.com/your-org/bank-config-repo.git}
          default-label: ${CONFIG_REPO_LABEL:main}
          clone-on-start: true
          force-pull: true
          timeout: 10

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
