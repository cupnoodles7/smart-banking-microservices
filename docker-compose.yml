services:
  mongo:
    image: mongo:8.0
    container_name: smartbank-mongo
    ports:
      - "27017:27017"
    command: ["--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: mongosh --quiet --eval "db.adminCommand('ping')"
      interval: 5s
      timeout: 5s
      retries: 10

  mongo-init:
    image: mongo:8.0
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    entrypoint: >
      mongosh --host mongo:27017 --eval
      '
      try { rs.status(); print("already initialized"); }
      catch (e) { rs.initiate({_id: "rs0", members: [{_id: 0, host: "mongo:27017"}]}); print("initialized"); }
      '

volumes:
  mongo-data: