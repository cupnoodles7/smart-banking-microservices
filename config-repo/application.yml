# Shared defaults applied to every service that imports config from the Config Server.

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

# JWT settings shared between the Auth Service (issuer) and API Gateway (validator).
security:
  jwt:
    secret: ${JWT_SECRET:change-me-super-secret-jwt-signing-key-min-256-bits-long-0123456789}
    access-token-expiry-ms: 900000       # 15 minutes  (PRD sec 6.8)
    refresh-token-expiry-ms: 604800000   # 7 days      (PRD sec 6.8)

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always
