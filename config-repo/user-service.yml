server:
  port: 8082

spring:
  data:
    mongodb:
      uri: ${USER_DB_URI:mongodb://localhost:27017/user_db}
      auto-index-creation: true

# Internal (service-to-service) auth for POST /users/internal, called by the Auth
security:
  internal:
    api-key: ${USER_INTERNAL_API_KEY:change-me-internal-user-service-key}

logging:
  level:
    com.smartbank.user: INFO
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}

  prometheus:
    metrics:
      export:
        enabled: true