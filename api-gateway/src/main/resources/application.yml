server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**
        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/accounts/**
        - id: wallet-service
          uri: lb://wallet-service
          predicates:
            - Path=/wallets/**
        - id: transaction-service
          uri: lb://transaction-service
          predicates:
            - Path=/transactions/**


        - id: auth-service-docs
          uri: lb://auth-service
          predicates:
            - Path=/v3/api-docs/auth-service
          filters:
            - RewritePath=/v3/api-docs/auth-service, /v3/api-docs
        - id: user-service-docs
          uri: lb://user-service
          predicates:
            - Path=/v3/api-docs/user-service
          filters:
            - RewritePath=/v3/api-docs/user-service, /v3/api-docs
        - id: account-service-docs
          uri: lb://account-service
          predicates:
            - Path=/v3/api-docs/account-service
          filters:
            - RewritePath=/v3/api-docs/account-service, /v3/api-docs
        - id: wallet-service-docs
          uri: lb://wallet-service
          predicates:
            - Path=/v3/api-docs/wallet-service
          filters:
            - RewritePath=/v3/api-docs/wallet-service, /v3/api-docs
        - id: transaction-service-docs
          uri: lb://transaction-service
          predicates:
            - Path=/v3/api-docs/transaction-service
          filters:
            - RewritePath=/v3/api-docs/transaction-service, /v3/api-docs

# Aggregated Swagger UI 
# Served by the gateway at http://localhost:8080/swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: auth-service
        url: /v3/api-docs/auth-service
      - name: user-service
        url: /v3/api-docs/user-service
      - name: account-service
        url: /v3/api-docs/account-service
      - name: wallet-service
        url: /v3/api-docs/wallet-service
      - name: transaction-service
        url: /v3/api-docs/transaction-service

# JWT validation
security:
  jwt:
    secret: ${JWT_SECRET}
    open-paths:
      - /auth/register
      - /auth/login
      - /auth/refresh
      - /actuator/**
      # Swagger UI + aggregated OpenAPI specs are public
      - /swagger-ui.html
      - /swagger-ui/**
      - /v3/api-docs/**
      - /webjars/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}

  prometheus:
    metrics:
      export:
        enabled: true

