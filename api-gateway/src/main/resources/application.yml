server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      discovery:
        locator:
          enabled: false
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**
        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/users/**
        - id: account-service
          uri: lb://account-service
          predicates:
            - Path=/accounts/**
        - id: wallet-service
          uri: lb://wallet-service
          predicates:
            - Path=/wallets/**
        - id: transaction-service
          uri: lb://transaction-service
          predicates:
            - Path=/transactions/**

# JWT validation at the edge. `secret` must match the Auth Service signing key.
security:
  jwt:
    secret: ${JWT_SECRET:change-me-super-secret-jwt-signing-key-min-256-bits-long-0123456789}
    open-paths:
      - /auth/register
      - /auth/login
      - /auth/refresh
      - /actuator/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
  endpoint:
    health:
      show-details: always
