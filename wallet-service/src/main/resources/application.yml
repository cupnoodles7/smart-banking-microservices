spring:
  application:
    name: wallet-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URI:http://localhost:8761/eureka/}
  instance:
    prefer-ip-address: true
    ip-address: ${EUREKA_INSTANCE_IP:127.0.0.1}

management:
  endpoints:
    web:
      exposure:
        include: health,info
bank:
  wallet:
    max-balance: 50000
    daily-transfer-limit: 20000
    daily-transaction-limit: 20
