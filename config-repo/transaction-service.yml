server:
  port: 8085

spring:
  data:
    mongodb:
      uri: ${TRANSACTION_DB_URI:mongodb://localhost:27017/transaction_db}

# Shared secret trusted services send in X-Internal-Api-Key to write to the ledger.
security:
  internal:
    api-key: ${INTERNAL_API_KEY:f2d26f3cac654b94db725f955aba7a465bbd3fedd46996ae1e48be69b6893bfb}

# Distributed tracing exported to Zipkin (PRD sec 6.x - observability).
management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_URI:http://localhost:9411/api/v2/spans}

# Human-readable request logs for the service (SLF4J -> Logback).
logging:
  level:
    com.smartbank.transaction: INFO
