server:
  port: 8084

spring:
  data:
    mongodb:
      uri: ${WALLET_DB_URI:mongodb://localhost:27017/wallet_db}


bank:
  wallet:
    max-balance: 50000
    daily-transfer-limit: 20000
    daily-transaction-limit: 20

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}

  prometheus:
    metrics:
      export:
        enabled: true
