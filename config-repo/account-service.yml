server:
  port: 8083

spring:
  data:
    mongodb:
      uri: ${ACCOUNT_DB_URI:mongodb://localhost:27017/account_db}

user-service:
  validation-enabled: true
transaction-service:
  enabled: true
  url: http://transaction-service
bank:
  savings:
    max-balance: 1000000
    daily-transfer-limit: 100000
    daily-transaction-limit: 20
  current:
    max-balance: 1000000
    daily-transfer-limit: 500000
    daily-transaction-limit: 100
  concurrency:
    max-write-retries: 3
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,circuitbreakers,circuitbreakerevents

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}

  prometheus:
    metrics:
      export:
        enabled: true

# Circuit Breaker (Resilience4j) - guards the account's best-effort call to the Transaction Service.
resilience4j:
  circuitbreaker:
    configs:
      default:
        failureRateThreshold: 50
        minimumNumberOfCalls: 5
        slidingWindowSize: 10
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3