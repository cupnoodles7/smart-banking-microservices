server:
  port: 8081

spring:
  data:
    mongodb:
      uri: ${AUTH_DB_URI:mongodb://localhost:27017/auth_db}
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,circuitbreakers,circuitbreakerevents

  endpoint:
    health:
      show-details: always

  metrics:
    tags:
      application: ${spring.application.name}

  prometheus:
    metrics:
      export:
        enabled: true

# Circuit Breaker (Resilience4j) - guards the auth service's call to the User Service during registration.
resilience4j:
  circuitbreaker:
    configs:
      default:
        failureRateThreshold: 50
        minimumNumberOfCalls: 5
        slidingWindowSize: 10
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
        # 4xx from the User Service (e.g. duplicate email) are business rejections, not outages.
        ignoreExceptions:
          - org.springframework.web.client.HttpClientErrorException